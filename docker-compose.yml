services:
  artifact-mcp:
    build: .
    container_name: artifact-mcp
    restart: unless-stopped
    ports:
      - "${HOST_BIND:-127.0.0.1}:3480:3480"
    env_file:
      - .env
    environment:
      - PORT=3480
      - DATA_DIR=/data
      # Set PUBLIC_BASE_URL in .env to your public hostname (used to build artifact/share links).
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:3480}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3480/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - "autoheal=true"
    networks:
      - default
      - preview_internal

  artifact-preview:
    profiles: ["preview"]
    build: ./preview-renderer
    container_name: artifact-preview
    restart: unless-stopped
    init: true
    user: pwuser
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:./preview-renderer/seccomp_profile.json
    pids_limit: 256
    mem_limit: 768m
    cpus: "1.0"
    shm_size: 256m
    networks:
      - preview_internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Uncomment for tunnel-only ingress; then remove the app's `ports:` publish entirely.
  # Configure the tunnel's origin service as http://artifact-mcp:3480.
  # cloudflared:
  #   image: cloudflare/cloudflared
  #   container_name: artifact-mcp-cloudflared
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${TUNNEL_TOKEN}
  #   depends_on:
  #     - artifact-mcp

networks:
  preview_internal:
    internal: true
